<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket POC</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 4px; font-weight: bold; }
        .status.disconnected { background: #fee2e2; color: #991b1b; }
        .status.connected { background: #dcfce7; color: #166534; }
        .log { background: #f1f5f9; padding: 10px; border-radius: 4px; height: 200px; overflow-y: auto; font-family: monospace; }
        button { background: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <h2>Painel de Notificações</h2>
    <div id="status" class="status disconnected">Status: Desconectado</div>

    <button id="connectBtn">Conectar (Token Válido)</button>
    <button id="connectBtnFail" style="background: #dc2626;">Conectar (Token Inválido)</button>

    <hr>

    <input type="text" id="msgInput" placeholder="Digite uma notificação..." style="padding: 8px; width: calc(100% - 100px);">
    <button id="sendBtn">Broadcast</button>

    <h3>Logs de Mensagens</h3>
    <div id="log" class="log"></div>

    <script>
        let ws;
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');

        function logMessage(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function connect(token) {
            if (ws) ws.close();

            // Passando o token na URL para o handshake
            ws = new WebSocket(`ws://localhost:8080?token=${token}`);

            ws.onopen = () => {
                statusEl.textContent = 'Status: Conectado';
                statusEl.className = 'status connected';
                logMessage('Tentando conectar...');
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                logMessage(`Recebido: [${data.type}] ${data.message}`);
            };

            ws.onclose = () => {
                statusEl.textContent = 'Status: Desconectado';
                statusEl.className = 'status disconnected';
                logMessage('Conexão encerrada.');
            };
        }

        document.getElementById('connectBtn').onclick = () => connect('super-secret-token-123');
        document.getElementById('connectBtnFail').onclick = () => connect('token-errado-999');

        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ message: input.value }));
                logMessage(`Enviado: ${input.value}`);
                input.value = '';
            } else {
                alert('Conecte-se primeiro!');
            }
        };
    </script>
</body>
</html>
